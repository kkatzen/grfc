name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Inject API Key
        run: |
          # Replace the placeholder in index.html with the secret value
          sed -i 's/__API_KEY__/${{ secrets.GOOGLE_API_KEY }}/g' index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          exclude: |
            .github/
            node_modules/
            .next/
            config.js

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
